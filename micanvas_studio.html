<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>미캔버스 AI 스튜디오</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f5f5f0;color:#1a1a1a;height:100vh;overflow:hidden}
.app{display:grid;grid-template-columns:200px 1fr;grid-template-rows:48px 1fr;height:100vh}
.topbar{grid-column:1/-1;display:flex;align-items:center;gap:12px;padding:0 16px;border-bottom:1px solid #e0e0d8;background:#fff}
.topbar h1{font-size:15px;font-weight:600}
.sidebar{border-right:1px solid #e0e0d8;padding:12px;display:flex;flex-direction:column;gap:8px;background:#fafaf7;overflow-y:auto}
.sidebar-title{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.work-item{padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;border:1px solid transparent;display:flex;justify-content:space-between;align-items:center}
.work-item.active{background:#fff;border-color:#ddd}
.work-item:hover:not(.active){background:#fff}
.work-item .del{font-size:11px;color:#ccc;cursor:pointer;padding:0 2px}
.work-item .del:hover{color:#e55}
.new-btn{width:100%;padding:7px;border:1px dashed #ccc;border-radius:8px;background:transparent;color:#888;cursor:pointer;font-size:13px}
.new-btn:hover{background:#fff}
.main{display:flex;flex-direction:column;overflow:hidden;background:#fff}
.content{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px}
.section-label{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.btn-group{display:flex;flex-wrap:wrap;gap:6px}
.style-btn{
  padding:6px 13px;border:1.5px solid #ddd;border-radius:20px;
  background:#fff;cursor:pointer;font-size:12px;color:#666;
  transition:all .15s;position:relative;overflow:hidden;
}
.style-btn:hover{border-color:#bbb;color:#333;background:#f9f9f9}
.style-btn.selected{
  background:#fff;border-color:#aaa;color:#111;font-weight:600;
  box-shadow:0 0 0 3px rgba(255,255,255,0.4),0 0 16px rgba(180,180,180,0.9),0 0 4px rgba(0,0,0,0.06);
}
.style-btn.flash{animation:flash .3s ease-out}
@keyframes flash{
  0%{box-shadow:0 0 0 10px rgba(255,255,255,0.7),0 0 32px rgba(220,220,220,1)}
  100%{box-shadow:0 0 0 3px rgba(255,255,255,0.4),0 0 16px rgba(180,180,180,0.9)}
}
.sub-group{padding:10px 12px;background:#f7f7f4;border-radius:8px;border:1px solid #e8e8e0;margin-top:8px}
.sub-label{font-size:11px;color:#999;margin-bottom:6px}
.sub-btn{
  padding:6px 13px;border:1.5px solid #ddd;border-radius:20px;
  background:#fff;cursor:pointer;font-size:12px;color:#666;transition:all .15s;
}
.sub-btn:hover{border-color:#bbb;color:#333}
.sub-btn.selected{
  background:#fff;border-color:#aaa;color:#111;font-weight:600;
  box-shadow:0 0 0 3px rgba(255,255,255,0.4),0 0 16px rgba(180,180,180,0.9);
}
.sub-btn.flash{animation:flash .3s ease-out}
.prompt-box{background:#f7f7f4;border:1px solid #e8e8e0;border-radius:8px;padding:12px;font-size:13px;color:#444;min-height:60px;line-height:1.7;word-break:break-all}
.version-row{display:flex;gap:6px;flex-wrap:wrap}
.ver-btn{padding:4px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:12px;color:#666}
.ver-btn:hover{border-color:#bbb;color:#333}
.ver-btn.active{background:#1a1a1a;border-color:#1a1a1a;color:#fff;font-weight:600}
.row-between{display:flex;justify-content:space-between;align-items:center}
.copy-btn{padding:5px 12px;border:1px solid #ddd;border-radius:8px;background:#f7f7f4;cursor:pointer;font-size:12px;color:#666;transition:all .2s}
.copy-btn:hover{background:#fff}
.copy-btn.copied{background:#0F6E56;border-color:#0F6E56;color:#fff}
.shortcut-wrap{border-top:1px solid #f0f0e8;padding:8px 16px 4px}
.shortcut-label{font-size:11px;color:#aaa;margin-bottom:6px}
.shortcut-btns{display:flex;gap:6px;flex-wrap:wrap}
.sc-btn{padding:5px 11px;border:1px solid #e0e0d8;border-radius:20px;background:#f7f7f4;cursor:pointer;font-size:12px;color:#666}
.sc-btn:hover{background:#fff;color:#333}
.input-area{display:flex;gap:8px;padding:10px 16px 12px;background:#fff}
.input-area textarea{flex:1;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;resize:none;height:52px;font-family:inherit;background:#fff;color:#1a1a1a}
.input-area textarea:focus{outline:none;border-color:#aaa}
.send-btn{padding:8px 18px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;align-self:flex-end}
.send-btn:hover{background:#333}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:12px;border:1px solid #e0e0d8;padding:20px;width:300px;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal h2{font-size:15px;font-weight:600;margin-bottom:12px}
.modal input{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;margin-bottom:12px;font-family:inherit}
.modal input:focus{outline:none;border-color:#aaa}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btns button{padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer}
.btn-cancel{border:1px solid #ddd;background:transparent;color:#666}
.btn-confirm{border:none;background:#1a1a1a;color:#fff;font-weight:600}
.divider{border:none;border-top:1px solid #f0f0e8;margin:4px 0}
.empty{color:#bbb;font-size:13px;margin:auto;text-align:center;line-height:2.2}
.log-item{font-size:12px;color:#888;padding:5px 10px;background:#f7f7f4;border-radius:6px}
</style>
</head>
<body>
<div class="app">

<div class="topbar">
  <h1>미캔버스 AI 스튜디오</h1>
  <span style="font-size:12px;color:#bbb;margin-left:auto">일반 요소 v0.5</span>
</div>

<div class="sidebar">
  <div class="sidebar-title">작업 목록</div>
  <div id="work-list"></div>
  <button class="new-btn" onclick="openModal()">+ 새 작업</button>
</div>

<div class="main">
  <div class="content" id="main-content">
    <div class="empty">왼쪽에서 작업을 선택하거나<br>새로 만들어요</div>
  </div>
  <div id="shortcut-area" style="display:none">
    <div class="shortcut-wrap">
      <div class="shortcut-label">빠른 수정</div>
      <div class="shortcut-btns">
        <button class="sc-btn" onclick="insert('더 단순하게')">더 단순하게</button>
        <button class="sc-btn" onclick="insert('선 더 얇게')">선 더 얇게</button>
        <button class="sc-btn" onclick="insert('흰 배경으로')">흰 배경으로</button>
        <button class="sc-btn" onclick="insert('더 귀엽게')">더 귀엽게</button>
        <button class="sc-btn" onclick="insert('색감 더 파스텔로')">색감 더 파스텔로</button>
        <button class="sc-btn" onclick="insert('외곽선 없애줘')">외곽선 없애줘</button>
      </div>
    </div>
  </div>
  <div class="input-area" id="input-area" style="display:none">
    <textarea id="user-input" placeholder="수정 요청 입력... 예: 아까 2번 기준으로 더 단순하게"></textarea>
    <button class="send-btn" onclick="send()">저장</button>
  </div>
</div>

</div>

<div class="modal-bg" id="modal" style="display:none">
  <div class="modal">
    <h2>새 작업 만들기</h2>
    <input type="text" id="work-input" placeholder="예: 리본 토끼" onkeydown="if(event.key==='Enter')confirmWork()"/>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-confirm" onclick="confirmWork()">만들기</button>
    </div>
  </div>
</div>

<script>
const STYLES = [
  { cat:'외곽선 유무', key:'outline', opts:['외곽선 있음','외곽선 없음'] },
  { cat:'선 굵기',    key:'stroke',  opts:['얇은 선','보통 선','두꺼운 선'] },
  { cat:'입체감',     key:'dim',     opts:['플랫','반입체','3D'] },
  { cat:'색감',       key:'color',   opts:['파스텔톤','비비드','저채도','흑백'] },
  { cat:'질감',       key:'tex',     opts:['매끈함','크레용','금속','연필'] },
  { cat:'출력 형태',  key:'out',     opts:['일반 요소','스티커형','흰배경 요소형'] }
];

const ENG = {
  outline: { '외곽선 있음':'with outline', '외곽선 없음':'no outline' },
  outlineColor: { '블랙':'thick black outline', '자연스럽게 (같은 색 계열)':'colored outline matching object color' },
  stroke: { '얇은 선':'thin stroke', '보통 선':'medium stroke', '두꺼운 선':'thick stroke' },
  dim:    { '플랫':'flat', '반입체':'semi-3D', '3D':'full 3D' },
  color:  { '파스텔톤':'pastel tones', '비비드':'vivid colors', '저채도':'muted tones', '흑백':'black and white' },
  tex:    { '매끈함':'smooth', '크레용':'crayon texture', '금속':'metallic', '연필':'pencil sketch' },
  out:    { '일반 요소':'element', '스티커형':'sticker style', '흰배경 요소형':'white background element' }
};

let works = [], active = null;

function openModal() {
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('work-input').focus(), 50);
}
function closeModal() {
  document.getElementById('modal').style.display = 'none';
  document.getElementById('work-input').value = '';
}
function confirmWork() {
  const name = document.getElementById('work-input').value.trim();
  if (!name) return;
  const w = { id: Date.now(), name, sel: {}, versions: [], log: [] };
  works.push(w);
  closeModal(); save(); renderSidebar(); selectWork(w.id);
}
function deleteWork(id, e) {
  e.stopPropagation();
  if (!confirm('이 작업을 삭제할까요?')) return;
  works = works.filter(w => w.id !== id);
  if (active && active.id === id) active = null;
  save(); renderSidebar(); renderMain();
}
function selectWork(id) {
  active = works.find(w => w.id === id);
  renderSidebar(); renderMain();
}
function renderSidebar() {
  document.getElementById('work-list').innerHTML = works.map(w => `
    <div class="work-item${active && active.id === w.id ? ' active' : ''}" onclick="selectWork(${w.id})">
      <span>${w.name}</span>
      <span class="del" onclick="deleteWork(${w.id}, event)">✕</span>
    </div>
  `).join('');
}

function flashBtn(el) {
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 300);
}
function toggle(key, val, el) {
  if (!active) return;
  if (active.sel[key] === val) { delete active.sel[key]; }
  else { active.sel[key] = val; if (el) flashBtn(el); }
  if (key === 'outline' && val === '외곽선 없음') delete active.sel.outlineColor;
  save(); renderMain();
}
function toggleSub(key, val, el) {
  if (!active) return;
  if (active.sel[key] === val) { delete active.sel[key]; }
  else { active.sel[key] = val; if (el) flashBtn(el); }
  save(); renderMain();
}

function buildPrompt() {
  if (!active) return '';
  const s = active.sel;
  const parts = [];
  if (s.outline === '외곽선 있음') {
    parts.push(s.outlineColor ? ENG.outlineColor[s.outlineColor] : 'with outline');
    if (s.stroke) parts.push(ENG.stroke[s.stroke]);
  } else if (s.outline === '외곽선 없음') {
    parts.push('no outline');
  }
  if (s.dim)   parts.push(ENG.dim[s.dim]);
  if (s.color) parts.push(ENG.color[s.color]);
  if (s.tex)   parts.push(ENG.tex[s.tex]);
  if (s.out)   parts.push(ENG.out[s.out]);
  if (!parts.length) return '';
  return `[${active.name}] ${parts.join(', ')} / flat vector style / white background / centered / no text / minimal / poster and sticker friendly`;
}

function renderMain() {
  const sa = document.getElementById('shortcut-area');
  const ia = document.getElementById('input-area');
  if (!active) {
    document.getElementById('main-content').innerHTML = '<div class="empty">왼쪽에서 작업을 선택하거나<br>새로 만들어요</div>';
    sa.style.display = 'none'; ia.style.display = 'none'; return;
  }
  sa.style.display = 'block'; ia.style.display = 'flex';
  const s = active.sel;
  const prompt = buildPrompt();

  const outlineSubHTML = s.outline === '외곽선 있음' ? `
    <div class="sub-group">
      <div class="sub-label">외곽선 색상</div>
      <div class="btn-group">
        <button class="sub-btn${s.outlineColor === '블랙' ? ' selected' : ''}" onclick="toggleSub('outlineColor','블랙',this)">블랙</button>
        <button class="sub-btn${s.outlineColor === '자연스럽게 (같은 색 계열)' ? ' selected' : ''}" onclick="toggleSub('outlineColor','자연스럽게 (같은 색 계열)',this)">자연스럽게 (같은 색 계열)</button>
      </div>
    </div>` : '';

  const stylesHTML = STYLES.map(({ cat, key, opts }) => `
    <div>
      <div class="section-label">${cat}</div>
      <div class="btn-group">${opts.map(o => `
        <button class="style-btn${s[key] === o ? ' selected' : ''}" onclick="toggle('${key}','${o}',this)">${o}</button>
      `).join('')}</div>
      ${key === 'outline' ? outlineSubHTML : ''}
    </div>
  `).join('');

  const verHTML = active.versions.length ? `
    <hr class="divider"/>
    <div>
      <div class="section-label">버전 기록</div>
      <div class="version-row">${active.versions.map((v, i) => `
        <button class="ver-btn${v.active ? ' active' : ''}" onclick="restore(${i})" title="${v.prompt || ''}">v${i + 1}</button>
      `).join('')}</div>
    </div>` : '';

  const logHTML = active.log.length ? `
    <div>
      <div class="section-label">수정 기록</div>
      <div style="display:flex;flex-direction:column;gap:5px">${active.log.slice(-5).reverse().map(l => `
        <div class="log-item">${l}</div>
      `).join('')}</div>
    </div>` : '';

  document.getElementById('main-content').innerHTML = `
    <div style="font-size:16px;font-weight:600">${active.name}</div>
    <hr class="divider"/>
    ${stylesHTML}
    <hr class="divider"/>
    <div>
      <div class="row-between" style="margin-bottom:8px">
        <div class="section-label" style="margin:0">프롬프트 미리보기</div>
        <button class="copy-btn" id="copy-btn" onclick="copyPrompt()">${prompt ? '복사' : '—'}</button>
      </div>
      <div class="prompt-box">${prompt || '스타일을 선택하면 여기에 프롬프트가 생성돼요'}</div>
    </div>
    ${verHTML}
    ${logHTML}
  `;
}

function copyPrompt() {
  const p = buildPrompt(); if (!p) return;
  navigator.clipboard.writeText(p).then(() => {
    const btn = document.getElementById('copy-btn');
    if (btn) { btn.textContent = '복사됨!'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 1500); }
  });
}
function saveVersion() {
  if (!active) return;
  active.versions.forEach(v => v.active = false);
  active.versions.push({ sel: JSON.parse(JSON.stringify(active.sel)), prompt: buildPrompt(), active: true });
  save();
}
function restore(i) {
  if (!active) return;
  active.versions.forEach((v, j) => v.active = j === i);
  active.sel = JSON.parse(JSON.stringify(active.versions[i].sel));
  active.log.push(`v${i + 1} 복원`);
  save(); renderMain();
}
function insert(text) {
  const ta = document.getElementById('user-input');
  ta.value = (ta.value ? ta.value + ' ' : '') + text; ta.focus();
}
function send() {
  const ta = document.getElementById('user-input');
  const text = ta.value.trim();
  if (!text || !active) return;
  saveVersion(); active.log.push(text); ta.value = ''; save(); renderMain();
}
function save() { try { localStorage.setItem('micanvas_v5', JSON.stringify(works)); } catch(e) {} }
function load() { try { const d = localStorage.getItem('micanvas_v5'); if (d) works = JSON.parse(d); } catch(e) {} }

load(); renderSidebar();
if (works.length) selectWork(works[0].id);
</script>
</body>
</html>
